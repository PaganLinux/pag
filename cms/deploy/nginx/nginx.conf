events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── paganlinux.eu ──────────────────────────────────
    server {
        listen 80;
        server_name paganlinux.eu www.paganlinux.eu;
        location / {
            proxy_pass http://web:3004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── cms.paganlinux.eu ──────────────────────────────
    server {
        listen 80;
        server_name cms.paganlinux.eu;
        location / {
            proxy_pass http://cms-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/ {
            proxy_pass http://cms-backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── git.paganlinux.eu ──────────────────────────────
    server {
        listen 80;
        server_name git.paganlinux.eu;
        location / {
            proxy_pass http://gitea:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── pagports.paganlinux.eu ─────────────────────────
    server {
        listen 80;
        server_name pagports.paganlinux.eu;
        location / {
            proxy_pass http://web:3004/ports/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── packages.paganlinux.eu ─────────────────────────
    server {
        listen 80;
        server_name packages.paganlinux.eu;
        location / {
            proxy_pass http://web:3004/packages/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── build.paganlinux.eu ────────────────────────────
    server {
        listen 80;
        server_name build.paganlinux.eu;
        location / {
            proxy_pass http://web:3004/builds/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── api.paganlinux.eu ──────────────────────────────
    server {
        listen 80;
        server_name api.paganlinux.eu;
        location / {
            proxy_pass http://cms-backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
